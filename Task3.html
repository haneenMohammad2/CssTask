<!DOCTYPE html>

<html lang="en">
<head>
  <title>Task5</title>
  <style>
      body {
          font-family: Arial;
          background-color: #ece8ff;
      }

      .signup-box {
          width: 380px;
          margin: 50px auto;
          background-color: #8d88d8;
          padding: 35px;
          border-radius: 15px;
      }
      h2 {
          text-align: center;
          color: white;
          font-size: 40px;
      }
      .name {
          display: flex;
          gap: 10px;
      }

      .name input {
          flex: 1;
      }
      input[type="text"],
      input[type="email"],
      input[type="password"] {
          display: block;
          width: 100%;
          padding: 10px;
          margin: 12px 0;
          border: none;
          border-radius: 5px;
          font-size: 16px;
          box-sizing: border-box;
      }
      button {
          width: 100%;
          padding: 12px;
          margin-top: 20px;
          border: none;
          border-radius: 25px;
          background-color: gray;
          color: white;
          font-size: 20px;
      }
      
      
      footer {
          text-align: center;
          margin-top: 40px;
          font-size: 13px;
      }
  </style>     

</head>

<body>


    

        <div class="signup-box">

            <h2>Sign Up</h2>

            <div class="name">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>

            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <input type="password" placeholder="Confirm Password">

            <input type="checkbox">
            <label>I accept the Terms of Use & Privacy Policy</label>

            <button>Sign Up</button>

            <p>
                Already have an account?
                <a href="#">Login here</a>
            </p>

        </div>

        <footer>
            <p>Copyright © YourCompany.com</p>
        </footer>


</body>
</html>
