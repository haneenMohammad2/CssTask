<!DOCTYPE html>

<html lang="en">
<head>
  <title>Task5</title>
  <style>
      body {
          font-family: Arial, sans-serif;
          background: #b400d8;
      }

      .login-box {
          display: flex;
          justify-content: space-between;
          align-items: center;
          width: 800px;
          margin: 100px auto;
          background: white;
          border-radius: 20px;
          padding: 40px;
      }
      .left img {
          width: 300px;
      }
      .right {
          width: 320px;
      }
          .right h2 {
              font-size: 32px;
              color: #555;
              margin-bottom: 30px;
          }

          .right input {
              width: 100%;
              padding: 12px;
              margin-bottom: 15px;
              border: 1px solid #ccc;
              border-radius: 20px;
              box-sizing: border-box;
          }
      button {
          width: 100%;
          padding: 12px;
          background: #2ecc40;
          color: white;
          border: none;
          border-radius: 20px;
          font-size: 16px;
          font-weight: bold;
          margin-top: 15px;
          cursor: pointer;
      }
      .right a {
          color: #2ecc40;
          text-decoration: none;
          font-size: 14px;
      }
      
  </style>     

</head>

<body>
    <div class="login-box">
        
        <div class="left">
            <img src="imm.png" width="150">
        </div>
        <div class="right">
            <h2>Member Login</h2>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button>LOGIN</button>
            <p>
                Forgot?
            
                <a href="#">Forgot Username / Password ?</a>
            
            </p>
            <a href="#">Create your account-></a>
        </div>
        </div>

        
</body>
</html>
